<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuantumInvest | Strategy & Wishes</title>
    <!-- CSS loaded from root -->
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Main Navigation -->
        <header class="glass-header">
            <div class="logo">
                <span class="gradient-text">Quantum</span>Invest
            </div>
            <nav>
                <a href="#market" class="active">Market</a>
                <a href="#strategies">Strategies</a>
                <a href="#wishes">Wishes</a>
            </nav>
        </header>

        <main>
            <!-- Market Section -->
            <section id="market" class="active-section">
                <div class="section-header">
                    <h2>Live Market Overview</h2>
                    <p>Track top performing company shares</p>
                </div>
                <div class="grid-container" id="market-grid">
                    <!-- Populated dynamically via JS -->
                </div>
            </section>

            <!-- Strategies Section -->
            <section id="strategies">
                <div class="section-header">
                    <h2>Investment Strategies</h2>
                    <p>Design and manage your portfolio allocations</p>
                </div>
                <div class="content-split">
                    <!-- Strategy Creation Form -->
                    <div class="form-card glass-panel">
                        <h3>Create New Strategy</h3>
                        <form id="strategy-form">
                            <div class="input-group">
                                <label for="strat-name">Strategy Name</label>
                                <input type="text" id="strat-name" required placeholder="e.g. Tech Heavy Growth">
                            </div>
                            <div class="input-group">
                                <label for="strat-desc">Description</label>
                                <textarea id="strat-desc" rows="3" placeholder="Briefly describe this strategy..."></textarea>
                            </div>
                            <div class="input-group">
                                <label for="strat-alloc">Allocation Ideas</label>
                                <input type="text" id="strat-alloc" placeholder="e.g. 50% AAPL, 50% MSFT">
                            </div>
                            <button type="submit" class="btn-primary">Save Strategy</button>
                        </form>
                    </div>
                    <!-- Strategy List -->
                    <div class="list-container" id="strategies-list">
                        <!-- Populated dynamically via JS -->
                    </div>
                </div>
            </section>

            <!-- Wishes Section -->
            <section id="wishes">
                <div class="section-header">
                    <h2>Your Wishes & Goals</h2>
                    <p>Set target prices and watchlists for your favorite companies</p>
                </div>
                <div class="content-split">
                    <!-- Wish Creation Form -->
                    <div class="form-card glass-panel">
                        <h3>Make a Wish</h3>
                        <form id="wish-form">
                            <div class="input-group">
                                <label for="wish-ticker">Ticker Symbol</label>
                                <input type="text" id="wish-ticker" required placeholder="e.g. TSLA">
                            </div>
                            <div class="input-group">
                                <label for="wish-price">Target Price ($)</label>
                                <input type="number" step="0.01" id="wish-price" required placeholder="e.g. 200.00">
                            </div>
                            <div class="input-group">
                                <label for="wish-notes">Notes / Conditions</label>
                                <textarea id="wish-notes" rows="3" placeholder="Why this price?"></textarea>
                            </div>
                            <button type="submit" class="btn-primary">Add Wish</button>
                        </form>
                    </div>
                    <!-- Wishes List -->
                    <div class="list-container grid-list" id="wishes-list">
                        <!-- Populated dynamically via JS -->
                    </div>
                </div>
            </section>
        </main>
    </div>
    
    <!-- JS loaded from root -->
    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
